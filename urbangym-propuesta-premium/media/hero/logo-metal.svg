<svg width="640" height="640" viewBox="0 0 640 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="outerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 180) rotate(46) scale(320)">
      <stop stop-color="#44484D"/>
      <stop offset="0.45" stop-color="#171A1E"/>
      <stop offset="1" stop-color="#090B0D"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="114" y1="92" x2="532" y2="548" gradientUnits="userSpaceOnUse">
